body:
  text: 讀詩私記詩類提要臣等謹案讀詩私記五卷明李先芳撰先芳字伯承號北山監利人嘉靖丁未進士官至尚寶司少卿明史文苑傳載王世貞所定廣五子先芳其一也是書成於隆慶四年所釋大抵多從毛鄭毛鄭有所難通則參之吕氏讀詩記嚴氏詩緝諸書其自序曰文公謂小序不得小雅之説一舉而歸之刺馬端臨謂文公不得鄭衛之風一舉而歸之淫胥有然否不自揣量折衷其間云云蓋不専主一家者故其議論平和絶無區别門户之見如説鄭風子襟仍從學校之義則不取宋學謂國風小雅初無變正之名則不從漢説至楚茨南山等四篇則小序與集傳之説並存不置可否蓋小序皆以為刺幽王義有難通而集傳所云又於古無考故闕所疑也雖援據不廣時有闕略要其大綱與鑿空臆撰者殊矣朱彛尊經義考載先芳有毛詩考正不列卷數注曰未見而不載此書其為一書兩書蓋不可考然此書亦多辨定毛傳或彛尊傳聞未審誤犯其名歟乾隆四十四年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀讀詩私記原序芳自童時授詩于黃靜軒先生講周南樂只君子福履綏之據朱注以君子作后妃及鄭衛風淫奔之詞過半意竊疑之既授易于伯考蒙泉公遂廢前業諸不遑究者三十餘年矣頃因歸田之暇莊誦朱注并考東萊讀詩記及十三經注疏大全諸家採其近理易簡者羅緝成帙始信前所疑者非妄也呂氏依倚小序朱子多出已見據已見則如將仲子拒祭仲之諫丘中麻引子嗟之賢木瓜報齊桓之功青襟惜學校之廢無故而坐之以淫據小序則如楚茨以下四章為農務之報成瞻洛以下四章為君臣之宴樂何因而槩之以刺故文公謂小序不得小雅之説一舉而歸之刺馬端臨亦曰文公不得衛鄭之風一舉而歸之淫胥有然否邇者不自揣量折衷其間間為一解題曰私記非敢擬議前人各言其志俾勿忘耳但時制以朱注列學官而變風變雅有司不以命題師生不復授受大經未遍閲而類取科名者不少况他注乎顧豫言非迂儒則妄人也姑藏之山中以備考訂云隆慶四年秋日濮陽後學李先芳謹識
