body:
  text: 讀詩私記卷二明李先芳撰周南召南考朱注以岐周故地為周公召公采邑故有周召之名由此宣文王之化於南國故曰二南自北而南也不言周公統於文王也不言岐周而言江漢就教化所及之地而言也召南內俱載文王之化止有甘棠一事而名為召南者召公布文王之政善則歸君之意也周南始于關雎而終于麟趾者有夫婦然後有父子也召南始于鵲巢而終于騶虞者親親而仁民仁民而愛物見王道之成也關雎內求之不得恐不得其人以成內治之功非慕男女之情也鐘鼓之樂樂其有后妃之德非喜其遂男女之情也葛覃即其為絺為綌而知其能勤即浣濯無斁而知其能儉因其言告師氏而知其能敬因其歸寧父母而知其能孝關雎之所謂淑指其德之全體言也此所謂勤儉孝敬又各就其一事言也誦服之無斁之章則知周之所以興誦休其蠶織之章則知周之所以亡卷耳備酒漿之物酒醴乃婦人之職頃筐又易盈之器采而又采其不盈者志有所在也文王從役於外行彼周行故至周行想見其人而置其所采也小雅云佻佻公子行彼周行言其勞也與此意同金罍兕觥二器侍於君子以為合歡之具者也姑從而酌之庶幾尊俎之間若有見之者故少永懷其酌也意不在酒在所懷之人耳其懷也非慕琴瑟之樂念行役之久耳竊意此非后妃自作或自作亦出寓言丈夫行役婦人無出閨門之禮也樛木葛纍言后妃逮下而下繫戀之也文王有此賢妃則和氣致祥室家胥慶故詩人喜內助之賢有所自而贊揚文王之福不一而足也中庸樂爾妻孥父母其順意略相類君子仍指文王言朱注作小君內子頗似牽滯再按嚴注后妃能以惠下逮衆妾無妬忌之心則衆妾得以攀附而上進后妃如此樂哉其夫君子可謂福履安之矣與余見同螽斯繼樛木之後見多子之出於衆妾凡贊揚人者必稱多福多男子此又文王福履之易見者也桃夭見內無怨女外無曠夫也罝稱公侯呂氏記云文王時周人之詩極其尊稱不過曰公侯而已重天王也亦文王未嘗稱王之一驗凡雅頌稱王者皆追王後所作耳芣苡小序謂和平則婦人樂有子見王化之始也汝墳調飢朱注作輖重也疏義作朝俱未安竊意調如調停之調言飢而欲處之有求而未得也父母孔邇依集注後説言父母甚近不可懈于王事而貽其憂當紂之時不知君父之為尊今被文王之化雖婦人亦憂王室之如燬恐亡身以及其親也螽斯言子孫之衆也麟趾表子孫之賢也鵲巢當紂之時男女易為苟合多廢親迎之禮雖諸侯夫人亦莫之行今被文王之化諸侯始知慎重其事詩人喜其成禮故賦此以贊美之采蘩繼鵲巢之後諸侯既重婚姻之事故夫人亦重公侯之事也草蟲采蘋夫人既重公侯之事而大夫之妻亦有所效而思其夫奉其祭也行露讀詩記云使貞女之志得以自伸者召伯聽訟之明也羔羊當紂之時以酒為池懸肉為林在位多效此成風荒淫無度故畢命云兹殷庶士席寵惟舊怙侈滅義服美於人驕淫矜誇將由惡終俗之不良可想也一旦文王先之以卑服道之以敬止率之以日昃不遑食未幾時而在位者若此羔羊素絲言服有常制無侈心也自公退食言無他務食有常期也內無侈心紛擾外無他務羈絆故心廣體胖委蛇自得也非詩人向慕之深不能形容至此摽梅見二南之地有逺近故化有淺深桃夭必待氷泮此則逮其謂之其意殆謂急成婦道以相其夫與或曰女歸以漸不宜求昏如此之急也人情血氣既壯難盡自檢情竇既開奚顧禮義故男女及時所以全節行于未破之日耳向非文王之化亦不知慮及此也若依注恐強暴之辱豈文王之化能及婦女不及男子乎不必依小星衆妾言命江汜夫人知悔樛木不言命以命係于后妃也不言悔無所用其悔也死麕依後注作賦言美士以白茅包其死麕而誘懷春之女也有女如玉言女之美非麕鹿之所能誘末復緩詞以拒之恐失之激肆其無忌憚之為也摽梅望其來望之以正也故其詞急死麕懼其來拒其非正也故其詞緩若作凛然不可犯之詞則將有速我獄者何彼穠矣言王姬又云平王朱注作武王以後事又云平王即東遷之平王似當列王風黍離之類何以得與召南耶豈平王未遷之前先王之風化尚存而王姬下嫁國人美之有關雎鵲巢之遺意不忍降為黍離附諸召南之後見盛德至善之餘澤與騶虞小序云鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖搜田以時仁如騶虞則王道成也朱注解一發五豝豝牡豕也至吉日發彼小豝云豕牝曰豝將何所憑與按二南俱載文王之化惟甘裳何彼穠矣二篇不類蓋分陜之後始稱召伯文王之世豈有齊侯即襄公諸兒事無疑也疏義作平正也朱氏作齊一之侯恐未然姑缺之讀詩私記卷二
