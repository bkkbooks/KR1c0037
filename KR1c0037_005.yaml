body:
  text: 讀詩私記卷五明李先芳撰三頌考雅不言周頌言周者以别商魯三頌之名雖同而體制各異也别以尊卑之禮故魯頌以諸侯而後于周間以親疎之義故商頌以先代而後于魯獨存商者殷鑒不逺也魯之有頌或謂成王以天子之禮樂賜伯禽故有頌名或云僖公使季孫行父請命於周史克作頌豈伯禽之時無頌僖公因請而得與又泮水閟宫小序作僖公及按僖公無克淮夷事今考皇極經世成王元年丙戌淮夷畔戊子魯伯禽誓師於費淮夷平遂踐奄肅慎來賀據經文淮夷攸服大賂南金淮夷來同疑是伯禽時事魯不言風而言頌豈孔子魯人姑存其名而不削與清廟本祭文王而不言文王之徳惟曰顯相肅雍多士秉徳者何也葢君之聖者臣必賢徳之盛者人必法也維天假以溢我吕記假大也溢盈溢也承上文文王以純亦不已之徳啓佑後人甚大而盈溢也收之承而受之也維清吕記言周公宗祀文王于明堂以配上帝所謂肇禋以祀文王配上帝始於此也迄于周公遂以有成其成雖當周公之世其禎祥己見於文王矣竊意如天得一以清文王維清緝熙與天道同故先言其徳合天而後及其配上帝也烈文吕記周公居攝七年致政成王成王乃祭祖考戒諸侯而歌此詩也天作文王康之康字固要㸃出治岐之政見培植髙山之命脉鞏固岐周之皇圖意成命大全云不敢康以心言宥密以徳言以不敢康寧之心成宏深靜密之徳以宏深靜密之徳成繼續光明之業則所以基上天之命者在是所以繼先王之業者在是而皆不外乎此心故又以單厥心終焉我今日所以能安靖天下而保其所受之命者是又成王之賜也我将天其右之既右享之大全云其者辭之疑既者辭之決所以疑者尊之而不敢必也所以決者親之而如見也畏天之威補出儀刑文王意時邁大全云時邁之作見武王所以得天下所以保天下者皆無愧也武王巡狩之事詩有時邁書有武成時邁祭告之樂章也武成識其政事以示天下來世也庚戌柴望大告武成此告祭懐柔之實也昭我周王天休震動此莫不震疊之實也庻邦冢君暨百工受命于周此式序在位之實也偃武修文歸馬放牛此非戢櫜之意乎建官位事重民五教惇信明義崇徳報功此非懿徳以保之乎執競不顯承執競説奄有四方二句即所謂不顯也思文大全云后稷之配南郊與文王之配明堂其義一也而我将主言文王享其祭祀不說文王可以配上帝此篇主説后稷有徳可以配天不説后稷享其祭祀非有異也臣工如何新畬於皇來牟來牟是新田所出乎何氏又云将賜我新畬以豐年也竊意來牟是舊田已種者及此暮春之後可收而新田此時方用錢鎛治之如北方麥秋二季田也維莫之春以下當補來牟既播種矣此外復何求哉當治其新田也似與上下文相貫噫嘻成王是後人歎詞既昭假爾以下述成王戒農官之詞也終三十里欲其地之無遺利也振鷺在彼無惡二句陳註無温厚之意不可從大全云尊之曰客又以鷺比所謂譽也庶㡬不敢必之詞也夙夜無或息之意也豐年註稱祀田祖先農方社之詩經文不及一字葢言我之所以得有此酒醴烝進祖妣以和百禮降福無所不至者皆田祖之力也祭報之意在言外有瞽大全云始言樂官中言樂器終言樂聲之美先祖是聽幽有以感乎神也永觀厥成明有以感乎人也濳大全云漆沮興王之地取其所産而薦之者不忘本也雝克昌厥後古人臨文不諱如文諱昌而曰克昌武諱發而曰駿發穆諱滿而有王孫滿襄諱鄭而有衛侯鄭匡諱班而春秋書曹伯班簡諱夷而書晉侯夷是也綏我眉夀一節是綏予孝子克昌厥後之實也載見章昭考註云文穆武昭大全云后稷為始封之君其廟居中自二世為昭三世為穆逓數至十五世而文王廟次當穆十六世而武王廟次當昭也有客既有淫威大全云威等威也微子用其先王之車服禮樂其等威大異乎列國之諸侯既與之以甚大之威儀則其降之以甚大之福祉可知矣乂吕記云自管蔡以武庚禄父叛以周公之聖臨之二年而後平其用力艱矣故于微子之來見也則告之曰昔者既有淫威矣而今也降福孔夷葢逆順之理如此凡吾之威福非苟而已葢舍逆取順者王道所以比天下而無私作福作威者王制所以統天下而無外也武大全云武王之功所以天下莫强者以文王開之於前而武王受之於後也於勝殷以見其伐暴之義於遏劉以見其止殺之仁仁義之師王者之師也此大功之所由定而大業之所由成也閔予言武王父子以孝治天下者一敬而已訪落大全云延訪羣臣所以盡下情率時昭考所以守家法於乎悠哉以下皆率時昭考之事朕未有艾如自怨自艾之艾治也與上文率字相應言不能以武王之道率而治其身也敬之首一節既言成王述羣臣之詞則厥士即作士字亦無妨言羣臣以天自警也維予小子答其以學問自勉以承天意尤見上下交警處小毖成王于至親之間葢有難顯言者故托物以賦之載芟思媚其婦四句民忘其勞也邦家之光二句言可以尊賢可以養老也匪且有且節言有此稼穡之事斯有此豐年之慶不獨一時為然而振古如斯未有力田而不逢年者亦未有豐年而不本于力田者言自古以來皆如此繼此以往尤願勿替也良耜先言勤勞後言逸樂使勤者可以自忘其勞而怠者亦知以自奮也絲衣言省器省牲視濯者皆初祭時事而遂及㫖酒思柔葢古者初獻之後主與賔尸皆有獻酬之禮既畢然後亞獻非祭畢而飲也酌酌時也舞之名也初則遵養時晦繼則乗時純熙酌其時措之宜也註云武宿夜舞莫重于武宿夜言武王至商郊停止宿夜士卒皆歡樂歌舞以待旦故名焉桓皇以間之間革也謂革命也賚本武王封功臣之詩武王不敢自以為恩而推本文王又欲所封功臣當知所自也般大全云般旋也今名篇曰般取巡狩而遍乎四嶽所謂盤旋也陟其髙山嶞山喬嶽陟其二字貫底作三様山言無所不至朱註所謂周四嶽也翕河衆水也猶與由同言水由地中行不泛溢朱註所謂道于河也上四句言廵狩而祭告河嶽之事下三句言巡狩而朝㑹諸侯之事章内三言時字表尊王之義也駉頌僖公也僖公能遵伯禽之法儉以足用寛以愛民務農重穀牧于坰野魯人尊之於是季孫行父請命於周而史克作是頌思無疆思之逺也故思及于馬行地無疆無期思之乆也才茁壮也無斁無倦怠作奮起也徂徑行不回遹也獨稱馬者問國之富數馬以對諸侯有四馬朝祀曰良馬征伐曰戎馬田路曰田馬給官役曰駑馬天子之國曰萬乗諸侯之國曰千乗皆以馬名國之大事在祀與戎故馬為重也文公志在勤民而有騋牝之稱僖公思惟法祖而有駉馬之多孔子兼取之齊景公有馬千駟而民無稱者其徳不逮二公耳有駜駜彼乗黄恐是指來燕者故因以起興在公明明所謂精白一心以承休徳自今以始歳其有為庶民之慮切矣君子有穀二句為後世之慮深矣此所謂善頌善禱矣泮水僖公克服淮夷雖亦不見於春秋而僖公十三年嘗從齊桓㑹于鹹為淮夷之病杞十六年嘗從齊桓㑹于淮為淮夷之病鄫矣豈魯人見徐之不恭而欲祝其來格與按春秋魯自隱桓荘以來學校廢弛或昧僖伯之諫而觀魚于棠或逆孟春之令而逺狩于郎或拒曹劌之言而觀社于齊否則又将為焚丘築臺之樂耳求其能立學設教者無聞也說者謂泮水頌僖公也豈無見哉閟宫夀胥與試試謂信而有徴也我之所謂夀富台背者不徒為虛言也今而後凡所譽者必有所試而求其實騐也朱註作夀考之人相為公用其語意不類那大全云既言管聲又言磬聲又言穆穆厥聲盛稱聲樂見商人之尚聲連叶三聲字見商人之尚質也烈祖大全云那與烈祖皆祀成湯之樂然那詩則專言樂聲至烈祖則及夫酒饌焉商人尚聲豈始作樂之時則歌那既祭而後歌烈祖歟大抵商頌簡古難看辭斷而意續熟讀自見𤣥鳥武王靡不勝吕記云所謂武王者皆成湯耳再言武丁孫子當念其祖也武王靡不勝言湯無敵於天下也鄭氏謂髙宗之孫子有武功有王徳於天下者此非所以稱繼體守文之君况肇域彼四海殷受命咸宜豈所以稱武丁哉長發駿厖大全云湯受小國大國之共貢惟薄取之所以大厚天下也殷武大全云然此詩與閟宫全篇文意皆有相似者但閟宫為頌僖公脩宗廟而作殷武為髙宗武丁特立廟而作故閟宫所以頌僖公服夷蠻享福夀者皆未然之期望而此詩所以頌武丁服夷夏享福夀者皆已然之實事卒章則皆述其作廟之事以結之讀詩私記卷五
