body:
  text: 讀詩私記卷一明李先芳撰詩序按羣書考索歐陽氏云周南召南邶鄘衛王鄭齊豳秦魏唐陳檜曹此孔子未刪之前周太師樂歌之次第也周召邶鄘衛王鄭齊魏唐秦陳檜曹豳此今詩次第也周召邶鄘衛檜鄭齊魏唐秦陳曹豳王此鄭氏詩譜次第也詩正風周南召南王化之本也二南之變風故次之以邶鄘衛衛一國也而三其名志衛首惡滅與國也諸侯相并王迹滅矣雅亡而為一國之風故次之以王王制不足以統臨天下而畿内之諸侯若鄭者亦自為列國故次以鄭君臣上下之分失而人倫亂故次之以齊天下之風至此則無不變之國魏舜禹之都唐帝堯之國其遺風雖存今亦變矣故次之以魏唐先代之風化既冺天下相胥而夷矣故次之以秦夷狄之化行聖王之流風盡矣陳舜之後風化所厚也聖人之典法所在也今也風化熄而典法亡矣故次之以陳人情迫於危亡則思治安故思治者亂之極也故次之以檜曹亂既極必有治之之道周家之始葢嘗由之矣故次之以豳言變之可正所以識王業之興也王業成而為政于天下故次以雅雅者王之政也小之先大固有序也天下之治始于正風以風天下其終也功徳可以告於神明終始之義也故次之以頌頌之有魯葢生於不足也商則頌前代之美不可廢也故附于其後襄公二十九年季札請觀周樂于魯而豳居秦上秦在魏前陳在唐後載考左傳列國聘享賦詩如鄭伯有賦鶉之奔奔楚令尹子圍賦大明及穆叔不拜肆夏寗武子不拜彤弓鄭伯如晉子展賦将仲子鄭伯享趙孟及鄭六卿餞韓宣子子齹賦野有蔓草子産賦羔裘子太叔賦褰裳子游賦風雨子旗賦有女同車子栁賦蘀兮之類詩皆未叙于聖人之手不能無差哀公十一年孔子自衛反魯然後樂正雅頌各得其所刪詩嘗考經傳所引逸詩辭明理正未見其劣於三百篇也孔子何以刪之又所存三百五篇之中如詆君以碩鼠狡童如欲刺人之惡而自為彼人之辭以陷於所刺之地幾不可訓矣其何以録之孔子曰述而不作又曰蓋有不知而作者我無是也又曰多聞闕疑異時嘗舉史闕文之語而歎世道之不古存夏五郭公之書不欲遽正前史之缺誤如作詩之人可考其意可尋則録之其人不可考其意不可尋則刪之其可知者雖比興深逺詞㫖迂晦亦所不廢如芣苢鶴鳴蒹葭之類是也於其所不可知者雖直陳其事文義明白亦不果録如逸詩翹翹車乘之類是也於其可知者雖詞意流泆不能不類於狹邪者亦所不刪如桑中溱洧野有蔓草出其東門之類是也其不可知者雖詞意荘重一出於義禮者亦不果録如周道挺挺之類是也是其録者非私好也述而不作也其刪者非作惡也闕其所不知也彼夫子以其可知者傳之子夏以其不可知者付之逸詩故小序之傳有自來也或謂詩序為衛宏毛公所作諸儒多疑之即為二公所作然自漢以來經師授受去古未逺後學所當遵守體認以求詩人微意而得其庻㡬可也毛詩始末初孔子以詩授卜商商為之序以授曾申申授李克克授孟仲子仲子授根牟子牟子授荀卿卿授毛亨亨作詁訓傳以授毛萇以二公之所傳故名毛詩萇為河間獻王博士以詩授貫長卿長卿授解延年延年授徐敖鄭𤣥取毛氏訓詁所不盡及異同者續為註解後衛宏受毛詩於謝曼卿因作詩序又賈逵馬融鄭衆俱作毛詩傳遂傳於世論小序朱文公解詩依古經文附以己見中間依小序者纔十之一耳馬氏曰雅頌之序可廢國風之序不可廢葢雅頌詞㫖易見故讀文王在上於穆清廟二章以下諸篇無非文王受命之詞享祀之典觸類可推于此而復敷衍附㑹其說誠為贅疣若國風之芣苢以婦人樂有子為后妃之美也而其詩語不過形容采掇芣苢之情状而已黍離之序以為閔周室宮廟之顛覆也而其詩語不過慨歎禾黍之苗穗而已此詩之不言所作之意而賴序以明者也若捨序以求之則其所以采掇者為何事而慨歎者為何說乎叔于田之二詩序以為刺鄭荘公也而其詩語則鄭人愛叔段之辭耳揚之水椒聊二詩序以為刺晉昭公也而其詩語則晉人愛桓叔之辭耳此詩之序其事以諷初不言刺之之意而賴序以明者也若捨序以求之則如四詩也非子雲美新之賦則袁宏九錫之文耳是豈可以訓而夫子不刪之乎鴇羽陟岵之詩見於變風序以為征役者不堪命而作也四牡采薇之詩見於正雅序以為勞使臣遣戍役而作也而深味四詩之㫖則歎行役之勞苦敘饑渴之情状憂孝養之不遂悼歸休之無期其辭語一耳此詩之辭同意異而賴序以明者若捨序以求之則文王之臣民亦怨其上而四牡采薇不得為正雅矣即是數端而觀之則知序之不可廢也明矣朱註國風多淫奔之詞夫子刪詩有取關雎之為首篇者為其樂而不淫耳今考國風朱註凡為男女淫奔自敘者二十有四如桑中東門之墠溱洧東方之日東門之池東門之楊月出序本以為刺淫而文公獨以為淫者自作亦不甚謬若静女木𤓰采葛丘中有麻將仲子遵大路有女同車山有扶蘇蘀兮狡童褰裳風雨子衿揚之水出其東門野有蔓草序本别指他事首尾無一字及婦人者而文公類以為奔詞如果出於奔詞小序何諱不以直言而槩以他事如果不出於奔詞文公亦何所據類坐以淫蕩無恥之事然則孔子之所刪者竟何事也毋亦惑於鄭衛之音執泥臆見而使聖經為誨淫之具乎由是俗儒不以訓後學主司不以命題取士遂使鄭衛古風應讀者纔十之三耳或有指摘而明辨之者衆未嘗不笑其迂且狂也兹不佞據呂氏記並諸疏義演小序而述其大都未敢輕贅一詞故以俟知者同訂之記中有不註者俱依朱註如谷風偕老考槃之類讀詩之法孔子曰誦詩三百一言以蔽之曰思無邪孟子曰說詩者不以文害辭不以辭害志以意逆志是為得之夫經非所以誨邪也而戒其無邪辭所以達意也而戒其害志何也噫聖賢之慮逺矣夫詩發乎情者也而情之所發其辭不能無過故其於男女夫婦之間多憂思感傷之意而君臣上下之際不能無怨懟激發之辭十五國風為詩百五十有七篇而其為婦人而作者男女相悅之辭㡬及其半雖以二南之詩如關雎桃夭諸篇為正風之首然其所反覆詠歎者不過情慾燕私之事耳漢儒嘗以關雎為刺詩矣此皆昧於無邪之訓而以辭害志之過也而况邶鄘之末流乎故其怨曠之悲遇合之喜雖有人心者所不能免而其志切其辭哀習其讀而不知其㫖易以動盪人之邪情泆志而况以鋪張揄揚之辭而序淫泆流蕩之行乎然詩人之意則非以為是而勸之也葢知詩人之意者莫如孔孟慮學者讀詩而不得其意者亦莫如孔孟是以有無邪之訓焉則以其辭之不能不鄰乎邪也使篇篇如文王大明則奚邪之可閑乎是以有害志之戒焉則以其辭之不能不戾其意使章章如清廟臣工則奚意之難明乎以是觀之則知刺奔果出於作詩者之本意而夫子所不刪者其詩決非淫泆之人所自賦也辨詩本無變風變雅之名先儒舊説二南二十五篇為正風鹿鳴至菁莪二十二篇為正小雅文王至卷阿十八篇為正大雅皆文武成王時詩周公所定樂歌之詞邶至豳十三國為變風六月至何草不黄五十八篇為變小雅民勞至召旻十三篇為變大雅皆康昭以後所作及考安成劉氏曰詩人各隨當時政教善惡人事得失而美刺之未嘗有意於為正為變後人比而觀之遂有正變之分所以正風雅為文武成王時詩變風雅為康昭以後所作而豳風不可以為康昭以後之詩也大抵就各詩論之以美為正以刺為變猶之可也若拘其時事分其篇帙則其可疑者多矣葢孔子刪詩原情據理順其自然故醜好美刺相間而成章非故以何者為變何者為正也譬如列宿之麗天錯綜布列五色成文而躔次度數毫髪不爽能使人定時令察災祥有不待言而見者故善讀詩者不須問其篇章次第是非如何但玩味聖人垂示勸戒之意深於詩者也詩圖序略歐陽修云周之詩自文王始成王之際頌聲興焉周之盛徳之極文王之詩三十七篇其二十三篇繫之周公召公為周南召南其八篇為小雅六篇為大雅武王之詩六篇四篇為小雅二篇在召南之風成王之詩五十三篇其十篇為小雅十三篇為大雅三十一篇為頌是為詩之正經其後二世昭王立而周道㣲缺又六世厲王政益衰變雅始作厲王死於彘天下無君周公召公行政謂之共和凡十四年而幽王之下太子宜臼遷於洛邑號東周周室益微而平王之詩貶為風下同列國至於桓荘而詩止矣初成王立周公攝政管蔡作亂周公及其大夫作詩七篇周之太史以為周公詩主道豳國公劉太王之事故繫之豳謂國變風而諸侯之詩無正風其變風自懿王始作懿王時齊風始變夷王時衛風始變次厲王時陳風始變厲王崩周召共和唐風始變次宣王時秦風始變至平王時鄭風始變惠王時曹風始變陳最後至頃王時猶有靈公之詩於是止矣疑雅降為風諸侯有風無雅頌詩以風雅頌為三經王者諸侯通用之但其地不同耳非謂風賤於雅雅輕於頌而惟王者兼之也故有諸侯之風亦有王者之風風有風體凡出自閨門及民情好惡者是也周召二南所載不出乎閨壼里巷之事詞雖爾雅不得謂之雅而謂之風黍離以下雖多憂國憫時之詞亦係民情好惡不出於朝廷亦不得謂之雅而謂之風非王本無風降而為國風也雅有雅體歌於宗廟朝廷者是也諸侯亦有宗廟朝廷風既不倫雅頌又非其分将無詩乎竊疑魯既有頌焉知無雅又焉知列國之無雅頌乎其諸侯有風而無雅頌者以天子巡狩國史陳風而採之故列國有風無雅頌者未必無也以多溢美之詞為尊者自避故不敢聞於天子也不然魯何以有頌之名妄言姑記以俟知者讀詩總論孔子刪詩斷自周文王以下俱載周事尊昭代也商魯二頌附之耳及按二南以關雎后妃為首經則知周室王業之所自大雅以瞻卭召旻為末簡則知周室喪亂之所歸文王以一后妃之賢而正是四國幽王專一褒姒之寵而身死犬戎吁亦可畏哉故十五國風凡言婦徳邪正八十餘篇殆居全經之半而二雅極贊太任太姒之賢備道哲婦傾城之戒及頌亦右文母之典無非發二南之所藏表全經之大㫖也故小雅天保以上治内以馭朝廷以和兄弟朋友采薇以下治外以勞王事以燕大小臣工文武周公關雎麟趾之意綱紀法度之施盡於此矣成康守此以繼體故經内載成王之詩五十三篇宣王法此以中興故二雅美宣王之詩十有六篇幽厲失此以致喪亂故刺厲王者六篇刺幽王者四十有四篇末復拳拳為幽王無忝爾祖之歎厥㫖淵哉故文武成康由此以享千萬年無疆之祀而頌聲作幽厲不由此以遺千萬年不洗之臭孝子慈孫莫能改也亦惟不能去讒逺色以行文武之政耳讀詩私記卷一
