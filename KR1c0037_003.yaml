body:
  text: 讀詩私記卷三明李先芳撰邶鄘衛考衛自頃公首壞王制并邶鄘入衛衛自康叔受封武庚之地與邶鄘并為三國後邶鄘入于衛故三風皆載衛事大全云緑衣燕燕等詩莊姜自作共姜作柏舟桑中作于衛國而或係邶或係鄘泉水載馳竹竿皆作于外國而一係邶一係鄘一係衛意太師各從其得詩之地而係之也所以必係邶鄘故名者無乃欲寓興滅繼絶之心與其以衛繼二南之後為變風之首者關雎得人倫之至正邶柏舟處夫婦之變鄘柏舟處子母之變也柏舟小序言仁而不遇也衛頃公之時仁人不遇小人在側故借婦人不得其夫為詞亦有兄弟譬僚友也不可選言不以失志而喪所守也衛賢臣不遇於君猶不忍去厚之至也朱注作婦人不得于夫其詞尤易見緑衣莊姜善處夫婦之變能以古道自勉燕燕以善歸之仲氏日居復以古道望其夫終風願言則懷反求諸已終無怨尤之意厚之至也擊鼓小序按左傳州吁與宋陳伐鄭圍其東門五日而還出師不為久而衛人之怨如此身犯大逆衆叛親離莫肯為之用也有緑衣夫人不怨其夫斯有凱風人子不怨其母有雄雉妻能以德行勉其夫聞莊姜之風而興者也苦葉宣公納子伋之妻為宣姜夫人夷姜縊死國人化而成風多棄其舊婦故有谷風之作所謂一家讓一國興讓一人貪戾一國作亂信然哉朱注以為泛刺淫奔之詩不知何據豫嘗讀谷風而想孤臣去國之懷澘然淚下詩之感人如此式微旄丘言宣公失政不能自救焉能救人由此賢者不得志而仕于伶官作簡兮或出北門而怨天或賦北風而欲他歸甚則有新臺之刺二子乘舟之悲蓋夫婦無别父子不親未有不修身齊家而能治國者故賢者去衛骨肉相殘卒為狄人所滅所謂家道之暌必起于婦人也後此楚平王納太子建妻有鞭尸之禍唐明皇納壽王妃身竄南蜀幾失天下則知淫亂之禍其報如此靜女小序云刺衛君無道夫人無德故述古者賢君賢妃之相與首節言自處不輕得之不易也彤管古史紀過后妃以此見貽以禮處我也自牧言婦人惟酒食是議歸荑以備韲俎供豆實盡女職也所謂茅之為物薄而用可重也此古賢妃之所為而今不然也自牧猶卷耳周行之義朱注作淫奔期㑹之詞豫初讀鄘風見節淫邪正興敗之相雜而疑孔子删定之未詳今乃知賢者不係于世類不可以習俗之移人自諉也以宣姜墻茨之淫亂鶉奔之無良桑中世族之相竊而有共姜柏舟之苦節文公方中之興復伋壽二子宋許二夫人之賢達可見秉彞好德勉之在我耳蝃蝀戒女子之淫奔相鼠勉人臣之循理干旄之好賢載馳之展親若文公亦可謂修身親親而尊賢者其興國也宜哉淇澳三章俱以緑竹起興取其虛而有節也故國語季札稱武公為睿聖按史記衛武公名和釐侯次子也有寵于釐侯多豫之賂釐侯卒周宣王立其兄共伯為君和賂王以襲攻共伯共伯自殺衛人立和為衛侯是為武公又詩著衛世子共伯早死不云被殺若武公殺兄而代立豈可以為訓而形之國史乎姑記之碩人小序莊姜族類之貴容貌之美來嫁之儀宜為見重反嬖于羣妾而不之答益見莊公之狂惑也氓蚩惟其合之苟是以棄之輕也毖泉父母終而思歸載馳宗國失而欲弔竹竿適異國不見答而念父母兄弟河廣既出於夫而望歸於子皆人情之不能免者類能以禮義自間然凡民有喪匍匐救之况宗國乎許夫人之念切矣伯兮小序宣公之時蔡人衛人陳人從王伐鄭故婦人嘆其過時而不反焉木瓜小序云美齊桓公也衛國有狄人之敗出處于漕齊桓公救而封之遺以車馬器服衛人欲厚報之而作此詩也芄蘭鄭箋衛惠公以幼童即位自謂有才能而驕慢于大臣但習威儀不知為政以禮大夫刺之甲如甲乙之甲朱注訓長亦通王風考自幽王寵褒姒廢申后及太子宜臼申侯與犬戎弒王于戲立宜臼為平王東遷洛邑王室遂卑與諸侯無異故詩降為國風其繼邶鄘衛之後者邶鄘處夫婦母子之變王風處夷夏君臣父子夫婦兄弟之變也黍離三過而不易其初心其久役于外自悼之意並可見矣君子于役小序云刺平王也君子行役無期度在家之大夫思僚友在外之危難者如何勿思言行役多危難係在僚友我誠思之也君子陽陽小序云憫周也君子遭亂相招為祿仕全身逺害而已言君子為貧而仕為樂官房敖作樂之地也大略與簡兮意同爰小序云憫周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉葛藟小序云王族刺平王也周室道衰棄其九族焉采葛小序云懼讒也人之譖人多因其不見而乘間而讒之朱注以為淫奔之託詞大車小序云刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉朱注差明丘中有麻小序云思賢也莊王不明賢人放逐國人思之而作是詩也言子嗟隱處丘陵之間而殖麻麥果實以為生民思其賢而庶其肯徐來以從我也將其來食言自有食不必食其力也貽我珮玖言如懷寶席珍之意輸所藏以贈我也朱注以為婦人望其所與私者此係王風難以鄭風比例鄭風考鄭自桓公武公相繼為周司徒桓公死幽王之難武公有立平王之功故鄭次王朱注以為衛風三十有九而淫奔之詩才四之一鄭詩二十有一而淫奔之詩已不翅七之五蓋惑於鄭衛之樂皆為淫聲而涇渭不分槩以非淫者為淫者受誣不自覺其詞之偏也語云燕趙多佳人豈燕趙之間皆佳人與今仍依小序而編正如左緇衣禮記云好賢如緇衣又曰於緇衣見好賢之至今據朱注及讀詩記或稱鄭人或稱周人俱美武公父子之賢似非好賢本㫖竊謂武公好賢為之衣服館穀以厚贈之尤見武公之賢鄭風之善如潁考叔獻于公公賜食之類是也並録之將仲子小序云刺莊公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉及考疏義祭仲數諫莊公有君若不與臣請除之之言故國人云請於仲子兮汝當無踰越我居之里垣無損折我所樹之杞木以喻無干犯我之親戚無傷害我之兄弟段將為害我豈敢愛之而不誅與但畏我父母也父母愛之我誅之傷父母心矣故不忍也仲子之言可私懷也雖然父母之言亦可畏也言莊公以小不忍至於大亂故陳其拒諌之詞以刺之及云諸兄及云人之多言皆假公議以折之朱注以為淫奔之詞羔裘小序云刺朝也言古之君子以諷其朝見今之不然也若髙克河上遊戲之事豈有舍命不渝之理遵大路小序云思君子也莊公失道君子去之國人思望焉朱注作淫婦見棄之詞雞鳴末章疑女感士弋鳬鴈而飲酒行樂知其來而欲贈報之也不必以來順作親賢同車小序云刺忽也鄭人刺昭公忽之不昏於齊太子忽嘗有功于齊齊侯請妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之朱注作淫奔之詞扶蘇小序云刺忽也讀詩記云山宜有扶蘇者也隰宜有荷華者也朝宜有賢俊者也今觀昭公之朝者不見子都乃見狂且焉則昭公所美非美可知矣朱注作淫女戲其所私者蘀兮小序云刺忽也讀詩記云昭公微弱孤危其羣臣相謂國勢如槁葉之待衝風難將及矣叔兮伯兮宜各自謀爾倡我則我其和汝要汝矣要謂要結也蓋君不能倡故臣下自相倡和也按史記祭仲立忽宋莊公誘召祭仲復立突突後出奔祭仲立忽懼髙渠彌害己疑此時也朱注作淫女之詞狡童小序云刺忽也讀詩記云昭公有狡狂之志而無成人之實孤危將亡君子憂之至於不能餐息愛君之至也宋微子作傷殷操亦曰彼狡童兮不我好仇朱注作淫女見絶之詞褰裳小序云思見正也狂童恣行國人思大國以正己也讀詩記云彼大國有惠然念我鄭國之亂欲求為我討正之者非道逺而難至但褰其裳涉其溱水而來則至矣子不思我豈無他人者但言諸侯衆矣爾不我思則當有他國思我者朱注作淫女語其所私者風雨小序云思君子也亂世則思君子不改其度焉讀詩記云我得見此人則我之心豈不坦然而平哉朱注作淫奔之女言子襟小序云刺學校廢也亂世則學校不修焉讀詩記云世亂學校不修學者棄業賢者念之故曰悠悠我心縱不可以往教强聒子寧不思其所學而繼其音問遽爾棄絶於善道乎又言挑達登城而廢學是以一日不見如三月之久蓋言一日廢學則志荒放僻邪侈之心滋矣始言學無往教終言當及時以勉學也朱注作淫奔之詞揚之水小序云閔無臣也君子閔忽之無忠臣良士終以死亡而作是詩也終鮮二句表豫言之可信也朱注作淫者相謂之詞東門小序云閔亂也公子五爭兵革不息男女相棄民思保其室家焉蔓草小序云思遇時也君之澤不下流民窮于兵革男女失時思不期而㑹焉溱洧小序云刺亂也兵革不息男女相棄淫風大行莫之能救焉齊風考呂氏云齊五世至哀公荒淫怠慢紀侯譖之于周懿王使烹焉齊之變風始作雞鳴小序云思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉還小序云刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢間於馳逐謂之好焉東方之日出而即月出而發淫奔無厭窮日之力也甫田小序云大夫刺襄公也讀詩記云無禮義而求大功不修德而求諸侯志大心勞所求者非其道也逺人喻逺方之諸侯猶中庸之逺人也末節言苟由其道而循其序則小者俄而大微者俄而著厥德修罔覺非計功求獲者所能與也能修其德治其政諸侯不來將焉往哉魏風考按史記魏本畢公髙之後後為晉獻公所滅而取其地仍以畢萬為魏之苗裔賜其故地故魏風多載晉事猶邶鄘之于衛也陟岵無止言止其身也無棄言棄其家也無死言喪其生也詞愈迫而情彌切矣十畝之間非賢者所居以此為樂時事可知矣伐檀讀詩記云坎坎三句美君子在下位而樂者不稼以刺小人在位貪鄙無功受祿者末言君子指伐檀君子而言唐風考唐本成王封弟叔虞之地至子燮改唐為晉又魏亦晉地故二風載晉事甚悉遂無晉風之名焉蟋蟀山樞刺僖昭二公儉不中節不能及時行樂禍在朝夕而不悟也揚之水本叛逆之詞聖人何取焉其曰云何不樂云何其憂在昭公必非與民同憂樂者其舍此而之彼諒有以致之也末云有命言晉侯封自王命不敢犯之若以告人則事機一泄而方伯連帥至矣禍不可測也此時民雖叛逆猶知王法可畏苟昭公知此而早為之所庶可以潛消其不軌之心亦轉禍為福之幾也惜乎知不足以及之聖人取此欲人君察民情之憂樂畏天命之去留思患而預防保邦於未危不可以民之背叛而獨歸罪于彼也嚴注沃有篡宗國之謀而潘父隂主之將有內應昭公不知故百姓作此詩以深警之蓋微詞以泄其謀欲公聞而戒懼早為之備也及考桓叔至武公更六世而晉人不服及迫於王命而後不敢不聽則晉人初豈有從沃之心哉其言不敢告人乃所以告昭公也椒聊小序云刺晉昭公也君子見沃之盛强能修其政知其蕃衍盛大子孫將有晉國焉杕杜小序云刺時也君不能親其九族骨肉離散獨居而無兄弟將為沃所并爾羔裘言在位者服此美服不恤其民而使我不得其居不究其情也豈無他國可投但念故舊相好不忍離耳民情之厚如此有唐之遺風焉居居究究俱疑詞居居不得其居也鴇羽小序云刺時也昭公之後大亂五世君子下從征役不得養其父母而作也無衣觀武公滅晉必請命於天子以為安吉則前揚之水末章既聞有命民亦知天命可畏此時王綱雖不能振而天理之在人心不容泯滅亦可見矣聖人取此一以見為人臣者王命不可以襲取一以見為天子者名器不可以假人杕杜小序云刺晉武公也言其寡特兼其宗族而不求賢以自輔如杜生道左人不休息寡薄故也彼君子以下勉其好賢之誠庶賢者可至矣葛生小序云刺晉獻公也好攻戰而國人多喪故婦人以夫從征役而思之生不能遂其同樂而死則望其同穴也秦風考秦本伯益之後至秦仲宣王始封為大夫仲孫襄公以兵送平王遂封襄公為諸侯故秦風以仲為首車鄰小序云美秦仲也秦仲始大有車馬禮樂侍御之好焉其言逝者其耋其亡多其賜豫滿而自溢有死道後果以誅西戎不克見殺也故秦風多載秦仲以後之事蒹葭小序云刺襄公也未能用周禮將無以固其國焉蒹葭之方盛也雖蒼蒼其色不能適用必待霜露凝戾然後堅成可用猶秦雖富强必待禮義以成其國也而知禮義之人必求則得之耳所謂伊人知禮義之人也晨風小序云刺康公也忘穆公之業始棄其賢臣焉未見二句見康公初立想望賢者如是之切也如何二句責其不能終也權輿小序云刺康公也忘先君之舊臣與賢者有始而無終也陳風考陳自胡公五世而傳幽公故宛丘自幽公始宛丘小序云刺幽公也荒淫昏亂遊蕩無度焉東門小序云幽公荒淫男女化之棄其舊業㑹于道路也衡門小序云僖公願而無志賢者不樂於仕而隱居無求也東門之池小序云疾其君之淫荒而思賢女以配之也言池水本清以之漚麻則穢矣猶君心之荒於色也唐詩云蓮葉壞池水郎亦壞人心語意相類若得如淑姬如雞鳴之賢妃可以晤歌矣東門之楊小序云昏姻失時男女多違親迎女猶有不至者也墓門小序云陳他無良師傅以至於不義惡加於萬民焉言棘本多刺之物生於墓門非斧不足以析之猶他之不善必賴師傅以成之也梅本美實之木而梟萃之猶他之初心未壞而比之匪人耳防有鵲巢小序云宣公多信讒君子憂懼焉言防卭髙地也鵲居之苕生之猶讒人之在位也月出小序云在位不好德而悅美色焉朱注作男女相恱之詞檜曹二風考按史記虢檜之君貪而好利百姓不附周衰為鄭桓公滅之而檜之世次不可考曹本武王弟振鐸之後至昭公好奢而任小人曹之變風始作呂氏云匪風下泉思周之詩獨于曹檜者何也曰政出天子則强不陵弱各得其所政出諸侯則徵發之煩共役之困征伐之暴唯小國偏受其害所以眷懷宗周為獨切焉素冠言久不行三年之喪而創見之樂與之同歸而如一亦良心發見之一端也萇楚無家無室言有家有室則有賦稅為身纍也匪風言周道車馬經行之地方周之初駟牡騑騑周道倭遲何其盛也及今衰微無風之發無車之偈顧瞻周道蕭然一空未免中心怛兮也蜉蝣小序云昭公國小而迫無法以自守好奢而任小人將無所依焉候人小序云刺曹共公也鳲鳩小序云刺在位無君子用心不一也言鳲鳩七子疑若飼之難一矣然自鳲鳩視之七子猶一子也心惟專一故能均平以興君子周旋百度雖不一而令儀則有常不變即外以觀其內心之一者固結而不可解矣其帶其辨正是儀之發見處而心之如結者可想見矣惟其心之結故其儀不忒可以正國人而享夀考也心如結心字是一章關鍵詩人本意正言在位者皆不能如君子專一所以國人不服國祚不永陳氏曰心結而儀一且不忒表裏一致也四國國人之皆正逺邇一致也由之久而胡不萬年久近一致也國人願其年夀之久豈非欲賴其表正之久哉注內均平專一言專一自兼均平如無大無小無敢慢本是主一無適而逺近大小自無不平者故經文只言儀一而已豳風考豳風居變風之末豳風亦變風乎變風者紀人倫之變也始自柏舟終於下泉無非父子兄弟夫婦朋友之變至豳風周公被流言居東而作則君臣之變尤甚或曰其居末者要其變之終原其正之始也呂氏云豳居于風雅之間者風之所為終而雅之所為始也變風終于曹思明王賢伯之不可得於是次之以豳反之于周公而後至于鹿鳴言周之所以盛者由周公也七月大全云七月之詩一言以蔽之曰豫而已凡感節物之變而修人事之備皆豫為之謀也又曰前三章皆以暑退將寒為言故以七月流火一句為始至四章則以四月秀葽純陽之月為始五章則以五月斯螽動股為始六章則以六月食鬱及薁為始而迄乎九月叔苴七章則遂以九月築場圃為始而繼以十月納禾稼八章則以十二月正月二月為始而終于九月十月周正之歲終焉其所舉時月雖若參差不齊而細觀之則亦有次序如此又曰農者衣食之本惟其關生民之大命是以服天下之至勞今以此詩考之是其心無一念不在乎農也一歲之間無一日不專乎農也一家之內無一人不力乎農也伐柯小序云美周公也周大夫刺朝廷之不知也讀詩記云既得罪人之後周公遲留未歸士大夫刺王不知所以還周公之道又言伐柯匪斧則不能娶妻匪媒則不成言各有其道今欲周公之歸亦必有其道也又言執柯以伐柯即此手中之柯而得其法以比王欲迎周公亦不過反之於吾心則知所以迎之之道若我得見周公而陳其籩豆之列將有日矣讀詩私記卷三
